<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVault.ai - Trợ Lý Quản Lý Liên Kết Thông Minh</title>
    <!-- Nhúng Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ĐỊNH NGHĨA BIẾN MÀU SẮC (THEMING) --- */
        :root {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border-color: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #0284c7;
            --accent-hover: #0369a1;
            --border-color: #cbd5e1;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        /* --- CSS RESET & BASE STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- BỐ CỤC CHÍNH (LAYOUT) --- */
        aside { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; justify-content: space-between; }
        main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
        .container { padding: 30px; max-width: 1200px; width: 100%; margin: 0 auto; }

        /* --- SIDEBAR --- */
        .logo { font-size: 22px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: var(--text-muted); font-weight: 500; text-decoration: none; }
        .nav-item i { width: 20px; }
        .nav-item:hover, .nav-item.active { background-color: var(--bg-primary); color: var(--text-main); }
        .nav-item.drag-over { background-color: rgba(56, 189, 248, 0.2); border: 2px dashed var(--accent); }
        .badge { background-color: var(--border-color); color: var(--text-main); font-size: 12px; padding: 2px 8px; border-radius: 20px; }
        .theme-toggle-btn { background: none; border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; text-align: left; display: flex; align-items: center; gap: 10px; font-weight: 500; }

        /* --- HEADER & CONTROLS --- */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; flex-wrap: wrap; }
        .search-box { position: relative; flex: 1; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .view-controls { display: flex; gap: 10px; }
        .btn-view { background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .btn-view.active { color: var(--accent); border-color: var(--accent); }

        /* --- HỘP THOẠI THÊM LINK (INPUT BLOCK) --- */
        .add-vault { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; box-shadow: 0 4px 12px var(--shadow); margin-bottom: 30px; }
        .input-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .input-row input, .input-row select { flex: 1; padding: 12px; background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); outline: none; }
        .input-row select { max-width: 160px; }
        .btn-add { background-color: var(--accent); color: #ffffff; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background-color: var(--accent-hover); }
        .ai-indicator { font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 5px; margin-top: -5px; margin-bottom: 10px; display: none; }

        /* --- DANH SÁCH KHÔNG GIAN LINK --- */
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 100%)); gap: 20px; }
        .links-grid.grid-view { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        /* CARD STYLE (DÙNG CHO CẢ GRID & LIST) */
        .link-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; position: relative; box-shadow: 0 4px 6px var(--shadow); cursor: grab; display: flex; flex-direction: column; justify-content: space-between; }
        .link-card:active { cursor: grabbing; opacity: 0.6; }
        .link-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .link-icon { width: 40px; height: 40px; background-color: var(--bg-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); flex-shrink: 0; object-fit: cover; }
        .link-info { flex: 1; overflow: hidden; }
        .link-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .link-url { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; text-decoration: none; }
        .link-url:hover { color: var(--accent); }
        .link-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .link-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { font-size: 11px; background-color: var(--bg-primary); color: var(--accent); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border-color); }
        .link-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: auto; font-size: 12px; color: var(--text-muted); }
        .link-actions { display: flex; gap: 12px; }
        .btn-action { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
        .btn-action:hover { color: var(--text-main); }
        .btn-action.active-star { color: #f59e0b; }
        .btn-action.btn-delete:hover { color: #ef4444; }

        /* BIẾN ĐỔI SANG LIST VIEW CỰC NHANH BẰNG CSS CLASS */
        .links-grid.list-view .link-card { flex-direction: row; align-items: center; padding: 12px 20px; gap: 20px; }
        .links-grid.list-view .link-header { margin-bottom: 0; flex: 2; min-width: 250px; }
        .links-grid.list-view .link-desc { display: none; }
        .links-grid.list-view .link-tags { margin-bottom: 0; flex: 1; justify-content: flex-start; }
        .links-grid.list-view .link-footer { border-top: none; padding-top: 0; margin-top: 0; flex: 1; justify-content: flex-end; gap: 20px; }
    </style>
</head>
<body>

    <!-- THANH MENU BÊN TRÁI (SIDEBAR) -->
    <aside>
        <div>
            <div class="logo"><i class="fa-solid fa-vault"></i> LinkVault.ai</div>
            <nav class="nav-group">
                <div class="nav-item active" data-filter="all" ondragover="allowDrop(event)" ondragleave="handleDragLeave(this)" ondrop="handleDrop(event, 'all')">
                    <span><i class="fa-solid fa-layer-group"></i> Tất cả liên kết</span>
                    <span class="badge" id="count-all">0</span>
                </div>
                <div class="nav-item" data-filter="starred" ondragover="allowDrop(event)" ondragleave="handleDragLeave(this)" ondrop="handleDrop(event, 'starred')">
                    <span><i class="fa-solid fa-star" style="color: #f59e0b;"></i> Đã đánh dấu</span>
                    <span class="badge" id="count-starred">0</span>
                </div>
                <div class="nav-item" data-filter="top-clicks" ondragover="allowDrop(event)" ondragleave="handleDragLeave(this)" ondrop="handleDrop(event, 'top-clicks')">
                    <span><i class="fa-solid fa-fire" style="color: #ef4444;"></i> Dùng nhiều nhất</span>
                    <span class="badge" id="count-top">0</span>
                </div>
                <hr style="border-color: var(--border-color); margin: 10px 0;">
                <!-- DANH MỤC THẢ KÉO (DRAG-AND-DROP CATEGORIES) -->
                <div class="nav-item" data-filter="Work" ondragover="allowDrop(event)" ondragleave="handleDragLeave(this)" ondrop="handleDrop(event, 'Work')">
                    <span><i class="fa-solid fa-briefcase"></i> Công việc (Work)</span>
                    <span class="badge" id="count-work">0</span>
                </div>
                <div class="nav-item" data-filter="Study" ondragover="allowDrop(event)" ondragleave="handleDragLeave(this)" ondrop="handleDrop(event, 'Study')">
                    <span><i class="fa-solid fa-graduation-cap"></i> Học tập (Study)</span>
                    <span class="badge" id="count-study">0</span>
                </div>
                <div class="nav-item" data-filter="Entertainment" ondragover="allowDrop(event)" ondragleave="handleDragLeave(this)" ondrop="handleDrop(event, 'Entertainment')">
                    <span><i class="fa-solid fa-gamepad"></i> Giải trí (Chill)</span>
                    <span class="badge" id="count-entertainment">0</span>
                </div>
            </nav>
        </div>
        
        <!-- NÚT ĐỔI THEME GIAO DIỆN -->
        <button class="theme-toggle-btn" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
            <span id="theme-text">Chế độ tối</span>
        </button>
    </aside>

    <!-- NỘI DUNG CHÍNH (MAIN CONTENT) -->
    <main>
        <div class="container">
            <header>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Tìm kiếm tiêu đề, url, tag...">
                </div>
                <div class="view-controls">
                    <button class="btn-view active" id="view-grid" onclick="switchView('grid')"><i class="fa-solid fa-grid-2"></i> Lưới</button>
                    <button class="btn-view" id="view-list" onclick="switchView('list')"><i class="fa-solid fa-list"></i> Danh sách</button>
                </div>
            </header>

            <!-- KHU VỰC THÊM LINK (TỰ ĐỘNG THÔNG MINH) -->
            <section class="add-vault">
                <div class="input-row">
                    <input type="url" id="input-url" placeholder="Dán liên kết (URL) vào đây..." required>
                    <select id="select-category">
                        <option value="Work">Công việc</option>
                        <option value="Study">Học tập</option>
                        <option value="Entertainment">Giải trí</option>
                    </select>
                    <button class="btn-add" onclick="addNewLink()"><i class="fa-solid fa-plus"></i> Thêm</button>
                </div>
                <div class="ai-indicator" id="ai-loading">
                    <i class="fa-solid fa-robot fa-spin"></i> Trợ lý AI đang quét dữ liệu trang web và gợi ý tag tự động...
                </div>
                <div class="input-row">
                    <input type="text" id="input-title" placeholder="Tiêu đề trang web (Tự động điền nếu để trống)">
                    <input type="text" id="input-desc" placeholder="Mô tả ngắn trang web (Tự động điền nếu để trống)">
                </div>
            </section>

            <!-- LƯỚI / DANH SÁCH HIỂN THỊ LINK -->
            <section class="links-grid grid-view" id="links-container"></section>
        </div>
    </main>

    <!-- --- CORE JAVASCRIPT LOGIC --- -->
    <script>
        // Khởi tạo dữ liệu mẫu nếu LocalStorage trống
        let links = JSON.parse(localStorage.getItem('vault_links')) || [
            { id: 1710000000000, title: "GitHub", url: "https://github.com", desc: "Nền tảng quản lý mã nguồn và hợp tác lập trình lớn nhất thế giới.", category: "Work", tags: ["code", "git", "dev"], starred: true, clicks: 12, icon: "" },
            { id: 1710000000001, title: "Youtube", url: "https://youtube.com", desc: "Xem video giải trí, nghe nhạc, học tập trực tuyến.", category: "Entertainment", tags: ["video", "entertainment"], starred: false, clicks: 25, icon: "" }
        ];

        let currentFilter = "all";
        let currentView = "grid";

        // Tự động quét và điền thông tin thông minh khi người dùng dán URL
        document.getElementById('input-url').addEventListener('blur', async function() {
            const url = this.value.trim();
            if(!url || !url.startsWith('http')) return;

            const aiLoading = document.getElementById('ai-loading');
            aiLoading.style.display = 'flex';

            try {
                // Sử dụng API Microlink để cào siêu dữ liệu (Metadata) trang web bằng JS thuần khách (Client-side)
                const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.status === 'success') {
                    const meta = data.data;
                    if(!document.getElementById('input-title').value) {
                        document.getElementById('input-title').value = meta.title || "";
                    }
                    if(!document.getElementById('input-desc').value) {
                        document.getElementById('input-desc').value = meta.description || "";
                    }
                    
                    // Cơ chế gợi ý tag thông minh dựa trên dữ liệu cào được
                    let smartTags = [];
                    const textToAnalyze = ((meta.title || "") + " " + (meta.description || "")).toLowerCase();
                    
                    // Từ điển phân tích từ khóa đơn giản
                    const keywords = {
                        'code': ['github', 'developer', 'coding', 'programming', 'lập trình'],
                        'edu': ['study', 'learn', 'course', 'học', 'đại học', 'research'],
                        'news': ['news', 'báo', 'tin tức', 'social', 'reddit'],
                        'media': ['video', 'movie', 'music', 'youtube', 'phim', 'nhạc'],
                        'design': ['design', 'figma', 'ui', 'ux', 'ảnh', 'color']
                    };

                    for (let tag in keywords) {
                        if (keywords[tag].some(kw => textToAnalyze.includes(kw))) {
                            smartTags.push(tag);
                        }
                    }
                    
                    // Đính kèm logo favicon xịn nếu có
                    this.dataset.fetchedIcon = meta.logo?.url || "";
                    this.dataset.suggestedTags = JSON.stringify(smartTags);
                }
            } catch (err) {
                console.log("Không thể fetch metadata tự động (Có thể do lỗi mạng hoặc link chặn):", err);
            } finally {
                aiLoading.style.display = 'none';
            }
        });

        // Hàm thêm link mới vào kho lưu trữ
        function addNewLink() {
            const urlInput = document.getElementById('input-url');
            const titleInput = document.getElementById('input-title');
            const descInput = document.getElementById('input-desc');
            const catSelect = document.getElementById('select-category');

            if (!urlInput.value) {
                alert("Vui lòng nhập đường dẫn URL!");
                return;
            }

            let computedTitle = titleInput.value.trim();
            if (!computedTitle) {
                try { computedTitle = new URL(urlInput.value).hostname; } 
                catch(e) { computedTitle = "Liên kết mới"; }
            }

            // Lấy tag tự động gợi ý hoặc gán mặc định nếu trống
            let finalTags = ["link"];
            if (urlInput.dataset.suggestedTags) {
                const parsed = JSON.parse(urlInput.dataset.suggestedTags);
                if(parsed.length > 0) finalTags = parsed;
            }

            const newLink = {
                id: Date.now(),
                title: computedTitle,
                url: urlInput.value.trim(),
                desc: descInput.value.trim() || "Không có mô tả.",
                category: catSelect.value,
                tags: finalTags,
                starred: false,
                clicks: 0,
                icon: urlInput.dataset.fetchedIcon || ""
            };

            links.unshift(newLink);
            saveAndRender();

            // Clear Form
            urlInput.value = ""; titleInput.value = ""; descInput.value = "";
            delete urlInput.dataset.suggestedTags; delete urlInput.dataset.fetchedIcon;
        }

        // Render dữ liệu ra màn hình (Hỗ trợ bộ lọc, sắp xếp, tìm kiếm, chế độ xem)
        function renderLinks() {
            const container = document.getElementById('links-container');
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = "";

            // 1. Thực hiện lọc dữ liệu
            let filtered = links.filter(link => {
                const matchSearch = link.title.toLowerCase().includes(searchQuery) || 
                                    link.url.toLowerCase().includes(searchQuery) || 
                                    link.tags.some(t => t.toLowerCase().includes(searchQuery));
                
                if (!matchSearch) return false;

                if (currentFilter === "all") return true;
                if (currentFilter === "starred") return link.starred;
                if (currentFilter === "top-clicks") return true; // Sẽ xử lý bằng cách sort riêng ở dưới
                return link.category === currentFilter;
            });

            // 2. Thực hiện sắp xếp (Ưu tiên Top Clicks hoặc Đã đánh dấu lên đầu)
            filtered.sort((a, b) => {
                if (currentFilter === "top-clicks") {
                    return (b.clicks || 0) - (a.clicks || 0);
                }
                return Number(b.starred || false) - Number(a.starred || false);
            });

            // 3. Tạo HTML cho từng phần tử card
            filtered.forEach(link => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.draggable = true;
                card.dataset.id = link.id;
                
                // Gắn sự kiện drag and drop cho thẻ card
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', link.id);
                });

                // Sử dụng favicon chất lượng cao hoặc icon mặc định tự tạo từ chữ cái đầu
                const iconContent = link.icon 
                    ? `<img src="${link.icon}" class="link-icon" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=${link.url}'">`
                    : `<div class="link-icon"><i class="fa-solid fa-link"></i></div>`;

                card.innerHTML = `
                    <div class="link-header">
                        ${iconContent}
                        <div class="link-info">
                            <div class="link-title" title="${link.title}">${link.title}</div>
                            <a href="${link.url}" target="_blank" class="link-url" onclick="trackClick(${link.id})">${link.url}</a>
                        </div>
                    </div>
                    <div class="link-desc">${link.desc}</div>
                    <div class="link-tags">
                        ${link.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                        <span class="tag" style="background: var(--border-color); color: var(--text-main);">${link.category}</span>
                    </div>
                    <div class="link-footer">
                        <span><i class="fa-solid fa-eye"></i> ${link.clicks || 0} lượt click</span>
                        <div class="link-actions">
                            <button class="btn-action ${link.starred ? 'active-star' : ''}" onclick="toggleStar(${link.id})">
                                <i class="fa-${link.starred ? 'solid' : 'regular'} fa-star"></i>
                            </button>
                            <button class="btn-action btn-delete" onclick="deleteLink(${link.id})">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            updateBadges();
        }

        // --- HÀM XỬ LÝ SỰ KIỆN TƯƠNG TÁC (ACTIONS) ---
        function trackClick(id) {
            const link = links.find(l => l.id === id);
            if(link) {
                link.clicks = (link.clicks || 0) + 1;
                saveAndRender();
            }
        }

        function toggleStar(id) {
            const link = links.find(l => l.id === id);
            if(link) {
                link.starred = !link.starred;
                saveAndRender();
            }
        }

        function deleteLink(id) {
            if(confirm("Bạn có chắc chắn muốn xóa liên kết này không?")) {
                links = links.filter(l => l.id !== id);
                saveAndRender();
            }
        }

        // --- CƠ CHẾ KÉO THẢ (DRAG & DROP TO CATEGORY) ---
        function allowDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(element) {
            element.classList.remove('drag-over');
        }

        function handleDrop(e, targetFilter) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            const linkId = parseInt(e.dataTransfer.getData('text/plain'));
            const link = links.find(l => l.id === linkId);
            
            if (link) {
                // Nếu thả vào các mục Category cụ thể, tiến hành chuyển đổi Category trực tiếp
                if (["Work", "Study", "Entertainment"].includes(targetFilter)) {
                    link.category = targetFilter;
                } else if (targetFilter === "starred") {
                    link.starred = true;
                }
                saveAndRender();
            }
        }

        // --- ĐIỀU HƯỚNG BỘ LỌC & THAY ĐỔI GIAO DIỆN CHẾ ĐỘ XEM (VIEW CONTROLS) ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderLinks();
            });
        });

        document.getElementById('search-input').addEventListener('input', renderLinks);

        function switchView(view) {
            currentView = view;
            const container = document.getElementById('links-container');
            document.getElementById('view-grid').classList.toggle('active', view === 'grid');
            document.getElementById('view-list').classList.toggle('active', view === 'list');
            
            if(view === 'list') {
                container.className = "links-grid list-view";
            } else {
                container.className = "links-grid grid-view";
            }
        }

        // Cập nhật số lượng hiển thị trên các Badge ở thanh Sidebar
        function updateBadges() {
            document.getElementById('count-all').innerText = links.length;
            document.getElementById('count-starred').innerText = links.filter(l => l.starred).length;
            document.getElementById('count-top').innerText = links.filter(l => (l.clicks || 0) > 5).length; // Những link trên 5 click
            document.getElementById('count-work').innerText = links.filter(l => l.category === 'Work').length;
            document.getElementById('count-study').innerText = links.filter(l => l.category === 'Study').length;
            document.getElementById('count-entertainment').innerText = links.filter(l => l.category === 'Entertainment').length;
        }

        // --- CHUYỂN ĐỔI CHẾ ĐỘ GIAO DIỆN SÁNG/TỐI (THEMING) ---
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            if(body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.className = "fa-solid fa-moon";
                themeText.innerText = "Chế độ tối";
                localStorage.setItem('vault_theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.className = "fa-solid fa-sun";
                themeText.innerText = "Chế độ sáng";
                localStorage.setItem('vault_theme', 'light');
            }
        }

        function saveAndRender() {
            localStorage.setItem('vault_links', JSON.stringify(links));
            renderLinks();
        }

        // Cài đặt ban đầu khi tải lại trang web
        window.onload = function() {
            if(localStorage.getItem('vault_theme') === 'light') {
                toggleTheme(); // Đồng bộ cấu hình theme cũ của người dùng
            }
            renderLinks();
        };
    </script>
</body>
</html>
