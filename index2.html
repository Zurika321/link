<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkVault.ai - Modern Link Organizer</title>
<style>
/* ------------------------------
   GLOBAL STYLES & DESIGN SYSTEM
--------------------------------*/
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}
body {
  height: 100vh;
  display: flex;
  background: linear-gradient(135deg, #0f172a, #1e1b4b);
  color: #e2e8f0;
  overflow: hidden;
}

/* ------------------------------
   SIDEBAR
--------------------------------*/
.sidebar {
  width: 260px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  flex-direction: column;
  padding: 24px;
}
.sidebar h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: #6366f1;
  margin-bottom: 40px;
}
.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.sidebar li:hover,
.sidebar li.active {
  background: rgba(99, 102, 241, 0.15);
  color: #06b6d4;
}

/* ------------------------------
   MAIN DASHBOARD
--------------------------------*/
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 24px;
  overflow: hidden;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.search-bar {
  flex: 1;
  margin-right: 16px;
}
.search-bar input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255, 255, 255, 0.03);
  color: #e2e8f0;
  font-size: 0.95rem;
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
}
.add-btn {
  background: linear-gradient(90deg, #6366f1, #06b6d4);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.add-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
}

/* ------------------------------
   LINK GRID
--------------------------------*/
.link-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 20px;
  overflow-y: auto;
  padding-right: 8px;
}
.link-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.link-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
}
.link-card img {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  margin-bottom: 8px;
}
.link-card p {
  font-size: 0.85rem;
  color: #cbd5e1;
  word-break: break-word;
}

/* ------------------------------
   CUSTOM CONTEXT MENU
--------------------------------*/
.context-menu {
  position: absolute;
  display: none;
  flex-direction: column;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  overflow: hidden;
  z-index: 1000;
}
.context-menu button {
  background: transparent;
  border: none;
  color: #e2e8f0;
  padding: 10px 16px;
  text-align: left;
  cursor: pointer;
  transition: background 0.2s;
}
.context-menu button:hover {
  background: rgba(99, 102, 241, 0.15);
  color: #06b6d4;
}

/* Scrollbar styling */
.link-grid::-webkit-scrollbar {
  width: 6px;
}
.link-grid::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
}
</style>
</head>
<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>LinkVault.ai</h1>
    <ul>
      <li class="active" data-category="all">All Links</li>
      <li data-category="social">Social Media</li>
      <li data-category="dev">Development & Github</li>
      <li data-category="work">Work & Productivity</li>
      <li data-category="design">Design & Inspiration</li>
    </ul>
  </div>

  <!-- MAIN DASHBOARD -->
  <div class="main">
    <div class="top-bar">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search links...">
      </div>
      <button class="add-btn" id="addLinkBtn">+ Add New Link</button>
    </div>

    <div class="link-grid" id="linkGrid">
      <!-- Example cards -->
      <div class="link-card" data-category="social" data-url="https://twitter.com">
        <img src="https://www.google.com/s2/favicons?sz=128&domain=twitter.com" alt="favicon">
        <p>Twitter</p>
      </div>
      <div class="link-card" data-category="dev" data-url="https://github.com">
        <img src="https://www.google.com/s2/favicons?sz=128&domain=github.com" alt="favicon">
        <p>GitHub</p>
      </div>
      <div class="link-card" data-category="work" data-url="https://notion.so">
        <img src="https://www.google.com/s2/favicons?sz=128&domain=notion.so" alt="favicon">
        <p>Notion</p>
      </div>
      <div class="link-card" data-category="design" data-url="https://dribbble.com">
        <img src="https://www.google.com/s2/favicons?sz=128&domain=dribbble.com" alt="favicon">
        <p>Dribbble</p>
      </div>
    </div>
  </div>

  <!-- CONTEXT MENU -->
  <div class="context-menu" id="contextMenu">
    <button id="openLink">Open Link</button>
    <button id="copyUrl">Copy URL</button>
    <button id="editInfo">Edit Info</button>
    <button id="deleteLink">Delete</button>
  </div>

<script>
/* ------------------------------
   JAVASCRIPT INTERACTIONS
--------------------------------*/
const linkGrid = document.getElementById('linkGrid');
const contextMenu = document.getElementById('contextMenu');
let currentCard = null;

// Right-click context menu
linkGrid.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const card = e.target.closest('.link-card');
  if (card) {
    currentCard = card;
    contextMenu.style.display = 'flex';
    contextMenu.style.top = e.pageY + 'px';
    contextMenu.style.left = e.pageX + 'px';
  }
});
window.addEventListener('click', () => {
  contextMenu.style.display = 'none';
});

// Context menu actions
document.getElementById('openLink').addEventListener('click', () => {
  if (currentCard) window.open(currentCard.dataset.url, '_blank');
});
document.getElementById('copyUrl').addEventListener('click', () => {
  if (currentCard) navigator.clipboard.writeText(currentCard.dataset.url);
});
document.getElementById('editInfo').addEventListener('click', () => {
  if (currentCard) {
    const newName = prompt('Edit link name:', currentCard.querySelector('p').textContent);
    if (newName) currentCard.querySelector('p').textContent = newName;
  }
});
document.getElementById('deleteLink').addEventListener('click', () => {
  if (currentCard) currentCard.remove();
});

// Category filtering
document.querySelectorAll('.sidebar li').forEach(li => {
  li.addEventListener('click', () => {
    document.querySelectorAll('.sidebar li').forEach(el => el.classList.remove('active'));
    li.classList.add('active');
    const category = li.dataset.category;
    document.querySelectorAll('.link-card').forEach(card => {
      card.style.opacity = 0;
      setTimeout(() => {
        if (category === 'all' || card.dataset.category === category) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
        card.style.opacity = 1;
      }, 200);
    });
  });
});

// Search filter
document.getElementById('searchInput').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  document.querySelectorAll('.link-card').forEach(card => {
    const name = card.querySelector('p').textContent.toLowerCase();
    card.style.display = name.includes(query) ? 'block' : 'none';
  });
});

// Add new link
document.getElementById('addLinkBtn').addEventListener('click', () => {
  const url = prompt('Enter link URL:');
  if (!url) return;
  const name = prompt('Enter link name:') || url;
  const domain = new URL(url).hostname;
  const card = document.createElement('div');
  card.className = 'link-card';
  card.dataset.url = url;
  card.dataset.category = 'all';
  card.innerHTML = `
    <img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" alt="favicon">
    <p>${name}</p>
  `;
  linkGrid.appendChild(card);
});
</script>
</body>
</html>
